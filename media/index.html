<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Codie Chat</title>
  <link rel="stylesheet" href="./chat.css">
</head>
<body>
  <div id="chat-container">
    <div id="session-bar">
      <div id="session-list"></div>
      <button id="new-session-btn" title="New Session">+</button>
    </div>
    <div id="context-bar">
      <label for="context-select">Context:</label>
      <select id="context-select"></select>
    </div>
    <div id="shortcut-bar"></div>
    <div id="settings-bar"></div>
    <div id="message-history"></div>
    <div id="input-area">
      <textarea id="prompt-input" rows="1" placeholder="Type your message..."></textarea>
      <button id="send-button">Send</button>
    </div>
  </div>
  <script src="./main.js"></script>
</body>
</html>
